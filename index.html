
<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>منصة آفاق - تحفيظ القرآن الكريم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Tajawal', sans-serif;
      }
      .quran-font {
        font-family: 'Amiri', serif;
      }
      
      /* Animations */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fadeIn {
        animation: fadeIn 0.5s ease-out forwards;
      }
      
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      .animate-scaleIn {
        animation: scaleIn 0.3s ease-out forwards;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      @media print {
        body {
          background-color: white !important;
          font-size: 12pt;
        }
        aside, header, button, .print\:hidden {
          display: none !important;
        }
        main {
          margin: 0 !important;
          padding: 0 !important;
          overflow: visible !important;
          height: auto !important;
        }
        .animate-fadeIn, .animate-scaleIn {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
        .bg-slate-50, .bg-[#F8FAFC] {
          background-color: white !important;
        }
        .rounded-[32px], .rounded-[40px] {
          border-radius: 12px !important;
          border: 1px solid #e2e8f0 !important;
        }
        section {
          padding: 0 !important;
        }
      }
    </style>
